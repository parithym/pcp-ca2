<!DOCTYPE html>
<html>
<head>
  <title>Fitness Tracker</title>
</head>
<body>

<script>
const tracker = {
  workouts: [],

  add(name, mins) {
    this.workouts.push({ name, mins });
    console.log(`Added: ${name} (${mins} mins)`);
  },

  stats() {
    const total = this.workouts.reduce((sum, w) => sum + w.mins, 0);
    console.log(`Total: ${total} mins`);
    console.log(`Sessions: ${this.workouts.length}`);
  }
};

tracker.add("Running", 30);
tracker.add("Cycling", 45);
tracker.stats();
</script>

</body>
</html>
