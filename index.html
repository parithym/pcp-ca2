<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; padding: 2rem; }
    .box { border: 1px solid #ccc; padding: 1rem; max-width: 300px; }
    p { font-size: 14px; margin-bottom: 6px; color: #333; }
    input { font-size: 14px; border: 1px solid #ccc; padding: 4px 6px; margin-right: 6px; width: 120px; }
    input[type=number] { width: 60px; }
    button { font-size: 14px; padding: 4px 10px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="box">
    <div id="list"></div>
    <p id="total" style="margin-top:8px; color:#666;"></p>
    <hr style="margin:8px 0; border:none; border-top:1px solid #eee;">
    <input id="n" placeholder="name" />
    <input id="m" type="number" placeholder="mins" />
    <button onclick="add()">add</button>
  </div>

  <script>
    const ws = [{name:"Running",mins:30},{name:"Cycling",mins:45}];

    function render() {
      document.getElementById('list').innerHTML = ws.map(w=>`<p>${w.name} — ${w.mins} mins</p>`).join('');
      document.getElementById('total').textContent = `${ws.length} sessions, ${ws.reduce((s,w)=>s+w.mins,0)} mins total`;
    }

    function add() {
      const n = document.getElementById('n').value.trim();
      const m = parseInt(document.getElementById('m').value);
      if (!n || !m) return;
      ws.push({name:n, mins:m});
      document.getElementById('n').value = '';
      document.getElementById('m').value = '';
      render();
    }

    render();
  </script>
</body>
</html>
